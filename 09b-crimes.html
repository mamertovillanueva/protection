<script>
// Function to load HTML into an element
function includeHTML(id, file) {
    fetch(file)
        .then(response => {
            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
            return response.text();
        })
        .then(data => {
            document.getElementById(id).innerHTML = data;
        })
        .catch(err => {
            console.error('Error loading file:', err);
        });
}


includeHTML("ulo", "30b-ulo.html");
</script>

<h1>Mga Krimen (Crimes)</h1>
<p><Gisupak nako karon ang dautan nga gihimo sa mga mangingilad, mapahimuslanon, tigtortyur (torturers), "blackmailers," ug mga mangingilupit (extortionists) diha sa akong kaliwat. Gisirhan nako ang pultahan sa dautan nga gihimo sa tanang matang sa mga kriminal.
<br><br>
Ang tanang korapsyon ug pagpamintas diha sa akong kaliwat kinahanglan nga moundang na karon. Sa ngalan ni Jesus, gibugto nako ang tanang sumpay sa pagpabalos, bayolente ug mapatunhayon nga dautang pamatasan, ug dautang pagpanghasi (malicious mischief).
<br><br>
Amen.</p>
